<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Laporan Praktikum</title>

    <!-- HUBUNGKAN KE CSS -->
    <link rel="stylesheet" href="prak1.css">
</head>
<body>

<div class="container">

    <h1>Laporan Praktikum</h1>

    <!-- SOAL -->
    <div class="soal">
        <h2>Soal</h2>
        <p>1. Jelaskan pengertian HTML!</p>
    </div>

    <!-- JAWABAN -->
    <div class="jawaban">
        <h2>Jawaban</h2>
        <p>HTML adalah bahasa markup yang digunakan untuk membuat struktur halaman web.</p>
    </div>

    <hr>

    <!-- FORM -->
    <h2>Form Data Diri</h2>

    <form action="sukes prak1.html">

        <table>
            <tr>
                <td>Nama</td>
                <td><input type="text" name="nama" required></td>
            </tr>

            <tr>
                <td>NIM</td>
                <td><input type="text" name="nim" maxlength="10" required></td>
            </tr>

            <tr>
                <td>Tanggal</td>
                <td><input type="date" name="tanggal" required></td>
            </tr>

            <tr>
                <td colspan="2">
                    <button type="submit" class="btn">Kirim</button>
                </td>
            </tr>
        </table>

    </form>

</div>

</body>
</html>
